  <image href="../picture/laserbehandeling.png" x="305" y="608" width="232" height="230" preserveAspectRatio="xMidYMid slice" clip-path="url(#laserClip)"/>
  <rect x="305" y="838" width="232" height="56" fill="#ffffff"/>
  <text x="421" y="874" text-anchor="middle" class="body olive" font-size="22" font-weight="700">Laserontharing</text>

  <rect x="554" y="608" width="232" height="230" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <image href="../picture/headspa.png" x="554" y="608" width="232" height="230" preserveAspectRatio="xMidYMid slice" clip-path="url(#headspaClip)"/>
