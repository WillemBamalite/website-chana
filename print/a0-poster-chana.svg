<svg xmlns="http://www.w3.org/2000/svg" width="841mm" height="1189mm" viewBox="0 0 841 1189">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f7f4ef"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d4f3d"/>
      <stop offset="100%" stop-color="#5a6e58"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#2a2a28" flood-opacity="0.16"/>
    </filter>
    <style>
      .display { font-family: "Georgia", "Times New Roman", serif; }
      .body { font-family: "Arial", "Helvetica", sans-serif; }
      .olive { fill: #3d4f3d; }
      .muted { fill: #5c5a56; }
      .gold { fill: #c9a962; }
      .white { fill: #ffffff; }
    </style>
    <clipPath id="faceClip"><rect x="56" y="608" width="232" height="230" rx="26"/></clipPath>
    <clipPath id="laserClip"><rect x="305" y="608" width="232" height="230" rx="26"/></clipPath>
    <clipPath id="headspaClip"><rect x="554" y="608" width="232" height="230" rx="26"/></clipPath>
  </defs>

  <rect x="0" y="0" width="841" height="1189" fill="url(#bg)"/>
  <circle cx="740" cy="120" r="150" fill="#e8c4c8" opacity="0.22"/>
  <circle cx="84" cy="1060" r="130" fill="#dcc9a0" opacity="0.18"/>
  <circle cx="120" cy="110" r="95" fill="#e8c4c8" opacity="0.18"/>

  <rect x="42" y="46" width="757" height="300" rx="30" fill="url(#banner)" filter="url(#shadow)"/>

  <rect x="120" y="78" width="600" height="100" rx="14" fill="#ffffff" opacity="0.98"/>
  <image href="../logo-transparent.png" x="170" y="86" width="500" height="84" preserveAspectRatio="xMidYMid meet"/>

  <text x="420" y="224" text-anchor="middle" class="display white" font-size="66" font-weight="700">Chana Beauty Lounge</text>
  <text x="420" y="267" text-anchor="middle" class="body white" font-size="27" font-weight="600" letter-spacing="1">
