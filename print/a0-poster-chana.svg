  <text x="84" y="985" class="display olive" font-size="40" font-weight="700">Volg onze opening</text>
  <text x="84" y="1022" class="body muted" font-size="24">Website: chanabeautylounge.nl</text>
  <text x="84" y="1054" class="body muted" font-size="24">Instagram: @chanabeautylounge</text>
  <text x="84" y="1086" class="body muted" font-size="24">WhatsApp: +31 6 00 00 00 00</text>

  <rect x="547" y="973" width="212" height="112" rx="16" fill="#fff9f3" stroke="#dcc9a0" stroke-width="2"/>
